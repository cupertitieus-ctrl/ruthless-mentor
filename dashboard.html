<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Reviews — ruthlessmentor.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

<body>

    <nav>
        <a href="/" class="logo"><img src="logo.png" alt="ruthlessmentor.com" class="logo-img"></a>
        <div class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/review.html" class="nav-cta">New review</a>
            <a href="#" class="nav-link-muted" id="signout-btn">Sign out</a>
        </div>
    </nav>

    <section class="dash-page">
        <div id="sub-info"></div>

        <!-- Subscribe prompt (shown only for non-subscribers) -->
        <div id="subscribe-prompt" style="display:none; background: linear-gradient(135deg, #1a1816 0%, #0d0b09 100%); border: 1px solid #c9a96e; border-radius: 10px; padding: 24px 28px; margin-bottom: 32px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 240px;">
                <h3 style="color: #c9a96e; font-size: 1.15rem; margin: 0 0 6px; font-weight: 700;">Basic Plan — $50/month</h3>
                <p style="color: #ccc; font-size: 0.9rem; margin: 0; line-height: 1.5;">10 reviews per month. Perfect for active writers working through multiple revisions.</p>
            </div>
            <button id="subscribe-btn" style="background: #c9a96e; color: #0d0b09; border: none; padding: 12px 28px; border-radius: 6px; font-weight: 700; font-size: 0.95rem; cursor: pointer; white-space: nowrap;">Subscribe Now</button>
        </div>

        <div class="dash-header">
            <h1>Your Reviews</h1>
            <p class="sub" id="dash-sub">Loading...</p>
        </div>

        <div class="dash-empty hidden" id="dash-empty">
            <p>No reviews yet.</p>
            <a href="/review.html" class="btn btn-glow">Submit your first work</a>
        </div>

        <div class="dash-list" id="dash-list"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
